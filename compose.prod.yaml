name: laravel_nuxt_production_test
services:
  mysql-prod:
    image: mysql:8.4
    env_file:
      - .env.prod
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
    volumes:
      - 'prod-mysql:/var/lib/mysql'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 3
      timeout: 5s

  redis-prod:
    image: redis:alpine
    volumes:
      - 'prod-redis:/data'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "php artisan migrate --force && 
             php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8080:8000"
    env_file:
      - .env.prod
    depends_on:
      mysql-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy

volumes:
  prod-mysql:
  prod-redis:
